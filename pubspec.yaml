name: airsoft_app
description: Airsoft app restore bundle
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  package_info_plus: ^8.0.0

  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  extended_image: ^10.0.1

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  supabase_flutter: ^2.9.1

  image_picker: ^1.1.2
  image_cropper: ^12.2.0
  mime: ^2.0.0
  path: ^1.9.0
  path_provider: ^2.1.3
  uuid: ^4.5.1
  http: ^1.2.1
  shared_preferences: ^2.5.3

  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^19.4.2
  app_badge_plus: ^1.2.9
  timezone: ^0.10.1

  url_launcher: ^6.3.0
  google_mobile_ads: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/logo.png
  remove_alpha_ios: true